name: Deploy MyST Site

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Zo kun je hem ook handmatig starten

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # De huidige stabiele versie

      - name: Install MyST
        run: npm install -g mystmd

      - name: Build Site
        run: myst build --html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _build/html
          branch: gh-pages 
